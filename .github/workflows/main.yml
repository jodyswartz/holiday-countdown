name: Sync main to gh-pages

on:
  push:
    branches:
      - main    # only run when pushing to main

permissions:
  contents: write   # needed so the action can push to gh-pages

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # get full history so we can create/update branches

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Force update gh-pages from main
        run: |
          # Make sure we're on main (the workflow is triggered from here)
          git checkout main

          # Create/update local gh-pages branch pointing at main
          git checkout -B gh-pages

          # Push gh-pages to origin (will create it if missing)
          git push origin gh-pages --force
